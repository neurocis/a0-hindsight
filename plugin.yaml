name: a0-hindsight
title: Hindsight Memory
description: >-
  Augments Agent Zero's memory with Hindsight (vectorize.io).
  Automatically retains conversation memories to Hindsight banks,
  enriches recall with semantic search, and injects disposition-aware
  context via reflect. Requires a running Hindsight server.
